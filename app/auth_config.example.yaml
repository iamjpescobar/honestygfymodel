# -----------------------------------------------------------------------
# AUTH CONFIG TEMPLATE — copy this file to auth_config.yaml and edit it.
# auth_config.yaml is in .gitignore on purpose: real subscriber credentials
# should never be committed to git, even to a private repo.
#
# HOW TO ADD A REAL USER:
#   1. Run:  python app/utils/hash_password.py "TheirChosenPassword"
#   2. Copy the printed hash into a new entry below under usernames.
#   3. Never store the plaintext password anywhere once it's hashed.
#
# roles: "admin" unlocks internal/debug tooling. "subscriber" is a paying
# customer. Add more roles later (e.g. "trial") if you want tiered access.
#
# ON RENDER: don't ship auth_config.yaml in the repo at all. Use Render's
# "Secret Files" feature to mount this file directly onto the server's
# persistent disk at deploy time, at the path app/auth_config.yaml — that
# way credentials never touch git or your public repo history.
# -----------------------------------------------------------------------

